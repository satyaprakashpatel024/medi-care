# application name
spring.application.name=medi-care
# Profile
spring.profiles.active=local
# server port
server.port=8080

# database configuration
spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
# This handles N+1 globally by fetching collections in batches
spring.jpa.properties.hibernate.default_batch_fetch_size=20
spring.data.web.pageable.serialization-mode=via-dto 
# validation
spring.validation.mode=strict
# Jackson config
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.default-property-inclusion=non_null
spring.jackson.deserialization.fail-on-unknown-properties=false
# Force JDBC to use IST
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# logging
logging.level.org.springframework.web=DEBUG
logging.level.com.care.medi=DEBUG

# security
#spring.security.user.name=admin
#spring.security.user.password=admin

# OpenAPI
# Change the Swagger UI path
springdoc.swagger-ui.enabled=true
# Define the JSON endpoint
springdoc.api-docs.path=/v3/api-docs
# Define the UI endpoint
springdoc.swagger-ui.path=/swagger-ui.html
# Ensure your package is scanned
springdoc.packages-to-scan=com.care.medi